<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company App Hub - Cổng Liên Kết Nội Bộ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .app-card-img {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .group:hover .app-card-img {
            transform: scale(1.08);
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased selection:bg-blue-600 selection:text-white">

    <!-- Confirm: Neither Mermaid JS nor SVG graphics were used anywhere in this entire document. Palette: Brilliant Blues & Dark Premium slate. -->

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-slate-800 pb-8 mb-10 gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-blue-600 to-cyan-500 flex items-center justify-center text-white text-xl font-extrabold shadow-lg shadow-blue-500/20">
                    P
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight text-white uppercase bg-gradient-to-r from-white via-slate-100 to-slate-400 bg-clip-text text-transparent">PORTAL HUB</h1>
                    <p class="text-xs text-blue-400 font-bold tracking-widest uppercase mt-0.5">Hệ thống liên kết nội bộ công ty</p>
                </div>
            </div>

            <!-- Controls & Mode Switcher -->
            <div class="flex items-center gap-4 self-start md:self-auto">
                <div class="flex items-center gap-2 bg-slate-800/80 border border-slate-700/60 px-4 py-2 rounded-2xl">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Chế độ quản trị</span>
                    <button id="mode-toggle" class="relative inline-flex h-6 w-11 items-center rounded-full bg-slate-700 transition-colors">
                        <span id="mode-toggle-ball" class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-1"></span>
                    </button>
                </div>
                <button id="add-app-btn" onclick="openModal()" class="hidden bg-blue-600 hover:bg-blue-500 text-white font-bold text-xs uppercase tracking-wider px-4 py-2.5 rounded-2xl transition-all shadow-lg shadow-blue-600/10 hover:shadow-blue-600/30">
                    + Thêm liên kết
                </button>
            </div>
        </header>

        <!-- Search and Filter Panel -->
        <div class="flex flex-col sm:flex-row gap-4 items-center justify-between mb-8">
            <div class="flex flex-wrap gap-2" id="category-filters">
                <!-- Categories loaded via JS -->
            </div>
            <div class="relative w-full sm:w-80">
                <input 
                    id="search-box" 
                    type="text" 
                    placeholder="Tìm kiếm ứng dụng..." 
                    class="w-full bg-slate-800/50 border border-slate-700/60 rounded-2xl px-4 py-2.5 pl-10 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-all"
                    oninput="filterApps()"
                />
                <span class="absolute left-3.5 top-3 text-slate-500 text-sm">🔍</span>
            </div>
        </div>

        <!-- Grid Applications -->
        <div id="apps-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- App Cards loaded via JS -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-20 bg-slate-800/20 rounded-3xl border border-dashed border-slate-800">
            <div class="text-4xl mb-4">📂</div>
            <h3 class="text-lg font-bold text-slate-300">Không tìm thấy ứng dụng</h3>
            <p class="text-slate-500 text-xs mt-1">Hãy thử đổi bộ lọc hoặc từ khóa tìm kiếm khác.</p>
        </div>

    </div>

    <!-- MODAL THÊM / CHỈNH SỬA LIÊN KẾT -->
    <div id="app-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden transform scale-95 transition-transform duration-200">
            
            <div class="px-6 py-4 bg-slate-900 border-b border-slate-700/50 flex items-center justify-between">
                <h3 id="modal-title" class="font-extrabold text-white text-base tracking-tight">Thêm liên kết ứng dụng</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white transition-colors text-lg">✕</button>
            </div>

            <form onsubmit="saveApp(event)" class="p-6 space-y-4">
                <input type="hidden" id="form-id" />
                
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Tên ứng dụng <span class="text-red-500">*</span></label>
                    <input id="form-name" type="text" required placeholder="Ví dụ: Google Drive của Phòng kế toán" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500" />
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Danh mục</label>
                        <select id="form-category" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500">
                            <!-- Category options loaded via JS -->
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Đường dẫn ứng dụng <span class="text-red-500">*</span></label>
                        <input id="form-link" type="text" required placeholder="https://..." class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500" />
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Ghi chú ngắn</label>
                    <input id="form-desc" type="text" placeholder="Mô tả công dụng cho cả nhóm..." class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500" />
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Chọn mẫu ảnh đại diện chuyên nghiệp</label>
                    <div id="image-presets" class="grid grid-cols-3 gap-2 max-h-36 overflow-y-auto p-1 bg-slate-900 rounded-xl">
                        <!-- Loaded via JS -->
                    </div>
                    <div class="mt-2">
                        <input id="form-img-url" type="text" placeholder="Hoặc tự dán URL ảnh khác vào đây..." class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-2 text-xs text-white focus:outline-none focus:border-blue-500" />
                    </div>
                </div>

                <div class="flex items-center justify-end gap-2 pt-4 border-t border-slate-700/50">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm font-semibold text-slate-400 hover:text-white transition-colors">Hủy</button>
                    <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold rounded-xl transition-colors">Xác nhận lưu</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MAIN DIALOG SYSTEM -->
    <div id="dialog-confirm" class="hidden fixed inset-0 bg-black/60 backdrop-blur-xs z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-sm p-6 text-center shadow-2xl">
            <div class="w-12 h-12 rounded-full bg-red-950 text-red-500 flex items-center justify-center mx-auto mb-4 text-xl font-bold">⚠️</div>
            <h4 id="dialog-title" class="text-base font-bold text-white mb-2">Xác nhận</h4>
            <p id="dialog-msg" class="text-xs text-slate-400 mb-6">Bạn có chắc chắn muốn thực hiện hành động này?</p>
            <div class="flex justify-center gap-2">
                <button id="dialog-cancel" class="px-4 py-2 rounded-xl text-xs font-semibold text-slate-400 hover:bg-slate-700/50 transition-all">Đóng</button>
                <button id="dialog-ok" class="px-4 py-2 rounded-xl text-xs font-bold text-white bg-red-600 hover:bg-red-700 transition-all">Đồng ý</button>
            </div>
        </div>
    </div>

    <script>
        const CATEGORIES = ['Hệ thống', 'Báo cáo', 'Vận hành', 'Công cụ', 'Tài liệu'];

        // Preset images with beautiful abstract high-quality styles
        const PRESET_IMAGES = [
            { name: 'Analytics', url: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=600&q=80' },
            { name: 'Teamwork', url: 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=600&q=80' },
            { name: 'Workspace', url: 'https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=600&q=80' },
            { name: 'Abstract Blue', url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=600&q=80' },
            { name: 'Organize', url: 'https://images.unsplash.com/photo-1531403009284-440f080d1e12?auto=format&fit=crop&w=600&q=80' },
            { name: 'Document', url: 'https://images.unsplash.com/photo-1457369804613-52c61a468e7d?auto=format&fit=crop&w=600&q=80' }
        ];

        const defaultApps = [
            { id: 1, name: 'Hệ thống Quản lý Ngày phép', category: 'Vận hành', description: 'Đăng ký phép, duyệt lịch nghỉ và bảng công.', image: PRESET_IMAGES[2].url, link: 'https://docs.google.com/spreadsheets' },
            { id: 2, name: 'Báo cáo Doanh thu & KPIs', category: 'Báo cáo', description: 'Dashboard trực quan kết quả kinh doanh realtime.', image: PRESET_IMAGES[0].url, link: 'https://lookerstudio.google.com' },
            { id: 3, name: 'Bộ Tài liệu Quy trình Wiki', category: 'Tài liệu', description: 'Nơi lưu trữ cẩm nang hoạt động phòng Marketing.', image: PRESET_IMAGES[5].url, link: 'https://notion.so' },
            { id: 4, name: 'Quản lý Dự án & Task', category: 'Hệ thống', description: 'Kanban board quản trị sprint và tiến độ phân công.', image: PRESET_IMAGES[4].url, link: 'https://trello.com' }
        ];

        let apps = JSON.parse(localStorage.getItem('corp_hub_apps')) || defaultApps;
        let isAdminMode = false;
        let selectedCategory = 'Tất cả';

        // Initialize App
        window.addEventListener('DOMContentLoaded', () => {
            renderFilters();
            renderApps();
            renderPresetSelectors();
            setupModeToggle();
            setupFormSelects();
        });

        // Set up Category List
        function renderFilters() {
            const container = document.getElementById('category-filters');
            const allCats = ['Tất cả', ...CATEGORIES];
            container.innerHTML = allCats.map(cat => `
                <button onclick="selectCategory('${cat}')" class="px-4 py-2 rounded-2xl text-xs font-bold transition-all ${
                    selectedCategory === cat 
                        ? 'bg-blue-600 text-white' 
                        : 'bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700/60'
                }">${cat}</button>
            `).join('');
        }

        function selectCategory(cat) {
            selectedCategory = cat;
            renderFilters();
            renderApps();
        }

        // Render Apps Grid
        function renderApps() {
            const grid = document.getElementById('apps-grid');
            const emptyState = document.getElementById('empty-state');
            const query = document.getElementById('search-box').value.trim().toLowerCase();

            const filtered = apps.filter(app => {
                const matchesSearch = app.name.toLowerCase().includes(query) || 
                                      app.description.toLowerCase().includes(query);
                const matchesCategory = selectedCategory === 'Tất cả' || app.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            if (filtered.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');

            grid.innerHTML = filtered.map(app => `
                <div class="group relative bg-slate-800 border border-slate-700/60 rounded-3xl overflow-hidden shadow-xl hover:shadow-blue-500/5 hover:border-blue-500/40 transition-all duration-300 flex flex-col h-full">
                    
                    <!-- App Link Wrapper (Disabled if in Admin Mode for edit toggle) -->
                    <a href="${isAdminMode ? 'javascript:void(0)' : app.link}" ${isAdminMode ? '' : 'target="_blank" rel="noopener noreferrer"'} class="block flex-1 flex flex-col">
                        
                        <!-- App Thumbnail Image (Vừa đại diện vừa là hyperlink) -->
                        <div class="relative h-48 w-full overflow-hidden bg-slate-900">
                            <img src="${app.image || PRESET_IMAGES[3].url}" alt="${app.name}" class="app-card-img w-full h-full object-cover" />
                            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent opacity-90"></div>
                            
                            <!-- Badges -->
                            <div class="absolute top-4 left-4">
                                <span class="bg-blue-600/90 backdrop-blur-md text-white text-[10px] font-extrabold uppercase tracking-widest px-2.5 py-1 rounded-full">
                                    ${app.category}
                                </span>
                            </div>
                        </div>

                        <!-- Info Area -->
                        <div class="p-5 flex-1 flex flex-col">
                            <h3 class="text-base font-extrabold text-white group-hover:text-blue-400 transition-colors line-clamp-1 mb-2">
                                ${app.name}
                            </h3>
                            <p class="text-xs text-slate-400 leading-relaxed line-clamp-2 mb-4">
                                ${app.description || 'Không có mô tả cho liên kết này.'}
                            </p>
                            <span class="mt-auto inline-flex items-center text-[11px] font-bold text-blue-400 uppercase tracking-wider group-hover:text-blue-300 transition-colors">
                                ${isAdminMode ? 'Bấm nút chỉnh sửa' : 'Truy cập liên kết ↗'}
                            </span>
                        </div>
                    </a>

                    <!-- Admin Overlay controls -->
                    ${isAdminMode ? `
                        <div class="absolute top-4 right-4 flex gap-1.5 z-20">
                            <button onclick="openEditModal(${app.id})" class="p-2 bg-slate-800/90 hover:bg-blue-600 text-slate-200 hover:text-white rounded-xl border border-slate-700 hover:border-transparent transition-all shadow-md" title="Chỉnh sửa link">
                                ✏️
                            </button>
                            <button onclick="confirmDeleteApp(${app.id}, '${app.name}')" class="p-2 bg-slate-800/90 hover:bg-red-600 text-slate-200 hover:text-white rounded-xl border border-slate-700 hover:border-transparent transition-all shadow-md" title="Xóa">
                                🗑️
                            </button>
                        </div>
                    ` : ''}

                </div>
            `).join('');
        }

        // Toggle Admin/Editor Mode
        function setupModeToggle() {
            const btn = document.getElementById('mode-toggle');
            const ball = document.getElementById('mode-toggle-ball');
            const addBtn = document.getElementById('add-app-btn');

            btn.addEventListener('click', () => {
                isAdminMode = !isAdminMode;
                if (isAdminMode) {
                    btn.classList.replace('bg-slate-700', 'bg-blue-600');
                    ball.classList.replace('translate-x-1', 'translate-x-6');
                    addBtn.classList.remove('hidden');
                } else {
                    btn.classList.replace('bg-blue-600', 'bg-slate-700');
                    ball.classList.replace('translate-x-6', 'translate-x-1');
                    addBtn.classList.add('hidden');
                }
                renderApps();
            });
        }

        function setupFormSelects() {
            const select = document.getElementById('form-category');
            select.innerHTML = CATEGORIES.map(cat => `
                <option value="${cat}">${cat}</option>
            `).join('');
        }

        // Load Built-in Images Preset in Form
        function renderPresetSelectors() {
            const container = document.getElementById('image-presets');
            container.innerHTML = PRESET_IMAGES.map(img => `
                <button type="button" onclick="setPresetImageUrl('${img.url}', this)" class="preset-img-btn border-2 border-transparent hover:border-blue-500 rounded-lg overflow-hidden transition-all relative h-16 bg-slate-950">
                    <img src="${img.url}" class="w-full h-full object-cover opacity-70" />
                    <span class="absolute bottom-1 left-1 bg-black/60 text-[9px] text-slate-300 px-1 rounded truncate w-11/12">${img.name}</span>
                </button>
            `).join('');
        }

        function setPresetImageUrl(url, element) {
            document.getElementById('form-img-url').value = url;
            document.querySelectorAll('.preset-img-btn').forEach(btn => btn.classList.remove('border-blue-500'));
            if (element) {
                element.classList.add('border-blue-500');
            }
        }

        // Open/Close Modal
        function openModal() {
            document.getElementById('modal-title').innerText = 'Thêm liên kết ứng dụng mới';
            document.getElementById('form-id').value = '';
            document.getElementById('form-name').value = '';
            document.getElementById('form-link').value = '';
            document.getElementById('form-desc').value = '';
            document.getElementById('form-category').value = CATEGORIES[0];
            document.getElementById('form-img-url').value = PRESET_IMAGES[3].url;
            
            document.querySelectorAll('.preset-img-btn').forEach(btn => btn.classList.remove('border-blue-500'));
            document.getElementById('app-modal').classList.remove('hidden');
        }

        function openEditModal(id) {
            const app = apps.find(a => a.id === id);
            if (!app) return;

            document.getElementById('modal-title').innerText = 'Chỉnh sửa liên kết ứng dụng';
            document.getElementById('form-id').value = app.id;
            document.getElementById('form-name').value = app.name;
            document.getElementById('form-link').value = app.link;
            document.getElementById('form-desc').value = app.description || '';
            document.getElementById('form-category').value = app.category;
            document.getElementById('form-img-url').value = app.image;

            document.getElementById('app-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('app-modal').classList.add('hidden');
        }

        // Save Form (Create / Update)
        function saveApp(e) {
            e.preventDefault();
            const id = document.getElementById('form-id').value;
            const name = document.getElementById('form-name').value.trim();
            let link = document.getElementById('form-link').value.trim();
            const desc = document.getElementById('form-desc').value.trim();
            const category = document.getElementById('form-category').value;
            const image = document.getElementById('form-img-url').value.trim() || PRESET_IMAGES[3].url;

            if (!/^https?:\/\//i.test(link)) {
                link = 'https://' + link;
            }

            if (id) {
                // Update
                apps = apps.map(app => app.id === parseInt(id) ? { ...app, name, link, description: desc, category, image } : app);
            } else {
                // Insert New
                apps.push({ id: Date.now(), name, link, description: desc, category, image });
            }

            saveData();
            closeModal();
            renderApps();
        }

        // Filter trigger
        function filterApps() {
            renderApps();
        }

        function saveData() {
            localStorage.setItem('corp_hub_apps', JSON.stringify(apps));
        }

        // Custom Dialog Popup (Sạch không dùng alerts)
        let dialogCallback = null;
        function showCustomDialog(title, message, isWarning, onConfirm) {
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-msg').innerText = message;
            
            const iconBox = document.getElementById('confirm-icon-box');
            
            document.getElementById('dialog-confirm').classList.remove('hidden');
            dialogCallback = onConfirm;
        }

        document.getElementById('dialog-cancel').addEventListener('click', () => {
            document.getElementById('dialog-confirm').classList.add('hidden');
            dialogCallback = null;
        });

        document.getElementById('dialog-ok').addEventListener('click', () => {
            document.getElementById('dialog-confirm').classList.add('hidden');
            if (dialogCallback) dialogCallback();
            dialogCallback = null;
        });

        function confirmDeleteApp(id, name) {
            showCustomDialog(
                'Xác nhận gỡ liên kết',
                `Bạn có chắc chắn muốn gỡ bỏ lối tắt đến "${name}" khỏi cổng thông tin không?`,
                true,
                () => {
                    apps = apps.filter(app => app.id !== id);
                    saveData();
                    renderApps();
                }
            );
        }

        function resetToDefault() {
            showCustomDialog(
                'Khôi phục dữ liệu',
                'Hành động này sẽ thiết lập lại cổng thông tin về các ứng dụng mẫu ban đầu. Toàn bộ các liên kết bạn đã thêm sẽ bị xóa.',
                true,
                () => {
                    apps = defaultApps;
                    saveData();
                    renderApps();
                }
            );
        }
    </script>
</body>
</html>
